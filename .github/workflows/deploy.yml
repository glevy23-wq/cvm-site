name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DEPLOY_URL"

      - name: Health check after deploy
        run: |
          sleep 10
          curl -f https://cvm-monitor.vercel.app/api/health || echo "Health check failed"

      - name: Update MEMORY.md with deploy timestamp
        if: github.ref == 'refs/heads/main'
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i "s/^> Atualizado.*/> Atualizado: $DATE — commit ${{ github.sha }}/" MEMORY.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MEMORY.md
          git diff --staged --quiet || git commit -m "chore: update MEMORY.md deploy timestamp [skip ci]"
          git push
