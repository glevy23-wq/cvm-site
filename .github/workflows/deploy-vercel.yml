name: 🚀 Deploy to Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Trigger Vercel Deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          echo "Deploying commit ${{ github.sha }} to Vercel..."
          
          RESPONSE=$(curl -sf -X POST \
            "https://api.vercel.com/v12/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "cvm-monitor",
              "gitSource": {
                "type": "github",
                "repoId": "1275437230",
                "ref": "main"
              },
              "target": "production"
            }')
          
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', d.get('uid','ERROR')))")
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "📋 Deploy ID: $DEPLOY_ID"
          
          if [ "$DEPLOY_ID" = "ERROR" ]; then
            echo "❌ Failed to get deploy ID"
            echo "$RESPONSE"
            exit 1
          fi

      - name: ⏳ Wait for Deploy Ready
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          echo "Monitoring: $DEPLOY_ID"
          
          for i in $(seq 1 20); do
            sleep 8
            STATE=$(curl -sf \
              "https://api.vercel.com/v13/deployments/${DEPLOY_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState', d.get('state','UNKNOWN')))")
            
            echo "[$i/20] $STATE"
            
            if [ "$STATE" = "READY" ]; then
              echo "✅ Deploy ready! https://cvm-monitor.vercel.app"
              exit 0
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "❌ Deploy failed: $STATE"
              exit 1
            fi
          done
          
          echo "⚠️ Timeout — deploy may still be running"
          exit 0
